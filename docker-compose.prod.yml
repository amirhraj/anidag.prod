

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-prod
    logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
    restart: always
    env_file:
      - ./bd/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anime_network
    ports:
    - "5432:5432"

  backend:
    build:
      context: ./Back
      dockerfile: Dockerfile.prod
    container_name: backend-prod
    logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
    restart: always
    env_file:
      - ./Back/.env.prod
    expose:
      - "8001"
    depends_on:
      - postgres
    volumes:
      - ./storage/uploads:/app/uploads/
      - ./storage/back_fon:/app/back_fon
      - ./storage/logs:/app/logs 
    networks:
      - anime_network

  frontend:
    build:
      context: ./Front_React
      dockerfile: Dockerfile.prod
      args:
          VITE_PROD_API_URL: /api
    container_name: frontend-prod
    restart: always
    env_file:
      - ./Front_React/.env.production
    volumes:
      - frontend_dist:/frontend-dist

    depends_on:
      - backend
    networks:
      - anime_network

  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        - frontend_dist:/usr/share/nginx/html:ro
        - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - anime_network

volumes:
  postgres_data:
  frontend_dist:

networks:
  anime_network: